<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=700, initial-scale=1.0" />
<title>Promoção</title>

<style>

@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Regular.ttf') format('truetype');
  font-weight: 400;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Bold.ttf') format('truetype');
  font-weight: 700;
}
@font-face {
  font-family: 'Inter';
  src: url('../fonts/Inter-Black.ttf') format('truetype');
  font-weight: 900;
}

* {
  box-sizing: border-box;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  color: #1F3C6E;
}

body {
  margin: 0;
  width: 700px;
  height: 1058px;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 700px;
  height: 1058px;
  border: 8px solid #e0b84b;
  border-radius: 40px;
  background: #ffffff;
  padding: 60px 40px 40px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: visible;
  position: relative;
}

/* ===== SELO ===== */
.selo {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 130px;
  height: 65px;
  display: none;
  z-index: 999;
}

.selo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* TOPO */
.topo {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  margin-bottom: 20px;
}
.logo img {
  max-width: 240px;
  max-height: 120px;
}

.tarja {
  background: #ff8c00; /* Laranja conforme solicitado */
  color: #ffffff;
  font-weight: 700;
  font-size: 42px;
  text-align: center;
  padding: 18px 40px;
  border-radius: 999px;
  margin-bottom: 30px;
  white-space: nowrap;
}

/* CENTRAL */
.area-central {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  flex-grow: 1;
  justify-content: center;
}

.texto-topo {
  font-size: 26px; /* Ajustado para ser idêntico ao queda.html */
  line-height: 1.2;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

/* VALOR DINÂMICO */
.valor-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 600px;
  height: 300px;
  overflow: hidden;
}

.valor-texto {
  font-weight: 900;
  font-size: 260px;
  line-height: 0.9;
  text-align: center;
  word-break: break-word;
  width: 100%;
}

/* "DE DESCONTO" removido conforme solicitado */
.desconto {
  display: none;
}

.complemento {
  font-size: 24px; /* Ajustado para ser idêntico ao queda.html */
  line-height: 1.2;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

.legal {
  font-size: 18px;
  line-height: 1.2;
  max-width: 560px;
  text-align: center;
  word-break: break-word;
}

/* RODAPÉ */
.rodape {
  text-align: center;
  margin-top: 20px;
}

.uf {
  font-size: 22px;
  font-weight: 700;
}

.segmento-wrapper {
  margin-top: 12px;
  font-size: 18px;
  font-weight: 400;
}

</style>
</head>

<body>

<div class="card">

  <div class="selo" id="selo-container">
    <img id="selo-img" />
  </div>

  <div class="topo">
    <div class="logo">
      <img src="{{LOGO}}" />
    </div>

    <div class="tarja">
      PROMOÇÃO
    </div>
  </div>

  <div class="area-central">

    <div class="texto-topo" id="texto-topo">
      {{TEXTO}}
    </div>

    <div class="valor-container" id="valor-container">
      <div class="valor-texto" id="valor-texto">
        {{VALOR}}
      </div>
    </div>

    <div class="complemento" id="complemento">
      {{COMPLEMENTO}}
    </div>

    <div class="legal" id="legal">
      {{LEGAL}}
    </div>

  </div>

  <div class="rodape">
    <div class="uf">{{URN}}</div>
    <div class="uf">{{UF}}</div>

    <div class="segmento-wrapper" id="segmento-bloco">
      SEGMENTO DE CLIENTES: {{SEGMENTO}}
    </div>
  </div>

</div>

<script>
window.addEventListener("load", function () {

  function autoFit(el, max = 60, min = 16) {
    let size = max;
    el.style.fontSize = size + "px";
    el.style.lineHeight = "0.9";

    const containerHeight = el.parentElement.clientHeight;
    const containerWidth = el.parentElement.clientWidth;

    // Se o elemento não tiver conteúdo, não faz nada
    if (!el.innerText.trim()) return;

    while (
      (el.scrollHeight > containerHeight || el.scrollWidth > containerWidth) &&
      size > min
    ) {
      size -= 2;
      el.style.fontSize = size + "px";
    }
  }

  // Ajuste dinâmico para o valor em até 3 linhas
  const valorEl = document.getElementById("valor-texto");
  autoFit(valorEl, 260, 80);

  /* SEGMENTO */
  const segmento = document.getElementById("segmento-bloco");
  const valorSegmento = "{{SEGMENTO}}".trim();

  if ((!valorSegmento || valorSegmento === "{{SEGMENTO}}") && segmento) {
    segmento.style.display = "none";
  }

  /* SELO */
  const seloContainer = document.getElementById("selo-container");
  const seloImg = document.getElementById("selo-img");
  const valorSelo = "{{SELO}}".trim();

  if (valorSelo && valorSelo !== "{{SELO}}") {
    seloImg.src = valorSelo;
    seloContainer.style.display = "block";
  }

});
</script>

</body>
</html>
